<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lethal Orca Fishing Game</title>
    <!-- Telegram Web Apps Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b1329;
            color: white;
            text-align: center;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            user-select: none;
        }
        header {
            margin-bottom: 10px;
        }
        .btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #059669;
        }
        #wallet-address {
            color: #38bdf8;
            font-family: monospace;
            font-size: 14px;
            margin: 5px 0;
        }
        #score-board {
            font-size: 20px;
            font-weight: bold;
            color: #fbbf24;
            margin: 5px 0;
        }
        canvas {
            background: linear-gradient(180deg, #1e3a8a 0%, #0f172a 100%);
            border: 3px solid #38bdf8;
            border-radius: 12px;
            display: block;
            margin: 0 auto;
            max-width: 100%;
            cursor: crosshair;
            box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <h2>🐋 Lethal Orca Fishing Arcade</h2>
        <button id="connect-btn" class="btn">Connect Phantom Wallet</button>
        <p id="wallet-address">Wallet: Not Connected</p>
        <div id="score-board">Score: <span id="score">0</span> $LORCA</div>
    </header>

    <!-- Game Canvas -->
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        if (tg) tg.expand();

        const connectBtn = document.getElementById('connect-btn');
        const walletAddressTxt = document.getElementById('wallet-address');
        const scoreTxt = document.getElementById('score');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let score = 0;
        let fishes = [];

        // Simple Phantom Wallet Connection
        async function connectWallet() {
            if (window.solana && window.solana.isPhantom) {
                try {
                    const resp = await window.solana.connect();
                    const walletAddress = resp.publicKey.toString();
                    walletAddressTxt.innerText = "Wallet: " + walletAddress.substring(0, 6) + "..." + walletAddress.substring(walletAddress.length - 4);
                    connectBtn.style.display = 'none';
                } catch (err) {
                    console.error(err);
                }
            } else {
                alert("Phantom Wallet nahi mila! Isay Phantom app ke browser me chalayein.");
            }
        }
        connectBtn.addEventListener('click', connectWallet);

        // Fish Object Setup
        class Fish {
            constructor() {
                this.x = Math.random() * (canvas.width - 40) + 20;
                this.y = canvas.height + Math.random() * 100;
                this.radius = 20;
                this.speed = 1.5 + Math.random() * 2;
                this.emoji = "🐟";
            }
            update() {
                this.y -= this.speed;
                if (this.y < -40) {
                    this.y = canvas.height + Math.random() * 50;
                    this.x = Math.random() * (canvas.width - 40) + 20;
                }
            }
            draw() {
                ctx.font = "30px Arial";
                ctx.textBaseline = "middle";
                ctx.textAlign = "center";
                ctx.fillText(this.emoji, this.x, this.y);
            }
        }

        // Spawn Fishes
        function initFishes() {
            for (let i = 0; i < 5; i++) {
                fishes.push(new Fish());
            }
        }

        // Animation Loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Bubbles background
            ctx.font = "16px Arial";
            ctx.fillText("🫧", 60, 180);
            ctx.fillText("🫧", 320, 120);

            fishes.forEach(fish => {
                fish.update();
                fish.draw();
            });

            requestAnimationFrame(animate);
        }

        // Tap/Click to catch
        function handleCatch(clickX, clickY) {
            fishes.forEach((fish) => {
                const dist = Math.hypot(clickX - fish.x, clickY - fish.y);
                if (dist < 30) {
                    score += 10;
                    scoreTxt.innerText = score;
                    fish.y = canvas.height + Math.random() * 30;
                    fish.x = Math.random() * (canvas.width - 40) + 20;
                }
            });
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            handleCatch(e.clientX - rect.left, e.clientY - rect.top);
        });

        canvas.addEventListener('touchstart', (e) => {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            handleCatch(touch.clientX - rect.left, touch.clientY - rect.top);
            e.preventDefault();
        }, { passive: false });

        initFishes();
        animate();
    </script>
</body>
</html>
