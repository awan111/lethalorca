<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LethalOrca Fishing - Play & Earn $LORCA</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(to bottom, #204d66, #0e2533);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Top Navigation Bar */
        .header {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        /* Top Left Logo and Balance Box */
        .logo-balance-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 20px;
            border-radius: 25px;
        }

        .top-logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .balance-box {
            font-size: 20px;
            font-weight: bold;
            color: #ffcc00;
        }

        .btn {
            background-color: #246083;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #357fae;
        }

        /* Game Area (Fish Animation Space) */
        .game-space {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .fish {
            position: absolute;
            font-size: 30px;
            animation: swim 10s linear infinite;
        }

        @keyframes swim {
            0% { left: -50px; top: 30%; }
            50% { top: 50%; }
            100% { left: 105%; top: 40%; }
        }

        /* Sidebar/Wallet Box */
        .wallet-panel {
            background: rgba(15, 34, 46, 0.95);
            border: 2px solid #357fae;
            border-radius: 15px;
            padding: 25px;
            width: 320px;
            text-align: center;
            box-shadow: 0px 0px 25px rgba(0,0,0,0.6);
            z-index: 5;
        }

        .status {
            margin: 15px 0;
            font-weight: bold;
            color: #ffcc00;
            font-size: 15px;
        }

        .withdraw-btn {
            background-color: #25a244;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .withdraw-btn:hover:not([disabled]) {
            background-color: #2dc653;
        }

        .hint {
            font-size: 12px;
            color: #a0a0a0;
            margin-top: 12px;
        }
    </style>
</head>
<body>

    <!-- Game Background Elements -->
    <div class="game-space">
        <div class="fish" style="animation-delay: 0s;">🐟</div>
        <div class="fish" style="animation-delay: 3s; animation-duration: 12s;">🐠</div>
        <div class="fish" style="animation-delay: 5s; animation-duration: 8s;">🐡</div>
    </div>

    <!-- Top Stats Bar -->
    <div class="header">
        <div class="logo-balance-container">
            <!-- Yeh aapka top-left par perfectly sized logo hai -->
            <img class="top-logo" src="https://awan111.github.io/lethalorca/orca-logo.png" alt="LethalOrca">
            <div class="balance-box"><span id="token-balance">5,000</span> LORCA</div>
        </div>
        <button class="btn" id="connect-top-btn">Connect Wallet</button>
    </div>

    <!-- Main Interactive Wallet UI -->
    <div class="wallet-panel">
        <h3 style="margin-top: 0; color: #357fae;">LIVE PHANTOM WALLET</h3>
        <p style="font-size: 14px; color: #e0e0e0; line-height: 1.4;">
            Connect your Phantom wallet to claim and withdraw your earned $LORCA tokens to Solana Mainnet.
        </p>
        <button class="btn" id="phantom-connect-btn" style="background-color: #4e44ce; width: 100%; margin-bottom: 10px; padding: 12px; border-radius: 20px;">
            👻 Connect Phantom Wallet
        </button>
        <div class="status" id="tx-status">Status: Wallet Not Connected</div>
        <button class="withdraw-btn" id="withdraw-btn" disabled style="opacity: 0.5; cursor: not-allowed;">
            Withdraw Tokens
        </button>
        <p class="hint">💡 Don't have Phantom? Install it from phantom.app</p>
    </div>

    <script>
        let isConnected = false;
        const connectTopBtn = document.getElementById("connect-top-btn");
        const phantomConnectBtn = document.getElementById("phantom-connect-btn");
        const txStatus = document.getElementById("tx-status");
        const withdrawBtn = document.getElementById("withdraw-btn");

        // Wallet Connection Logic
        function connectWalletSimulation() {
            if (isConnected) return;
            isConnected = true;
            connectTopBtn.innerText = "Connected (0xLorca...)";
            phantomConnectBtn.innerText = "👻 Wallet Connected";
            phantomConnectBtn.disabled = true;
            phantomConnectBtn.style.opacity = "0.7";
            phantomConnectBtn.style.cursor = "default";
            txStatus.innerText = "Status: Wallet Ready to Withdraw";
            txStatus.style.color = "#2dc653";
            
            // Enable Withdraw Button
            withdrawBtn.disabled = false;
            withdrawBtn.style.opacity = "1";
            withdrawBtn.style.cursor = "pointer";
        }

        // Event Listeners for Buttons
        connectTopBtn.addEventListener("click", connectWalletSimulation);
        phantomConnectBtn.addEventListener("click", connectWalletSimulation);

        // Withdrawal Handling
        withdrawBtn.addEventListener("click", function() {
            if (!isConnected) return;
            txStatus.innerText = "Processing Transaction...";
            txStatus.style.color = "#ffcc00";
            withdrawBtn.disabled = true;
            withdrawBtn.style.opacity = "0.6";
            withdrawBtn.style.cursor = "not-allowed";
            
            setTimeout(() => {
                alert("The simulator is working perfectly! Your 5,000 $LORCA tokens are securely logged in the local state. The withdrawal bridge goes live instantly once we hit the pump.fun bonding curve target and migrate to Raydium mainnet!");
                txStatus.innerText = "Locked until Mainnet Migration";
                txStatus.style.color = "#e63946";
            }, 2000);
        });
    </script>
</body>
</html>
