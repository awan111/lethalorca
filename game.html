<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lethal Orca Fishing Game</title>
    <!-- Telegram Web Apps Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Solana Web3 SDK -->
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #059669;
        }
        #wallet-address {
            margin-top: 15px;
            color: #38bdf8;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <h1>🐋 Lethal Orca Fishing Arcade</h1>
    <p>Welcome to the Play, Earn & Liquidate Hub!</p>

    <!-- Wallet Connect Button -->
    <button id="connect-btn" class="btn">Connect Phantom Wallet</button>
    <p id="wallet-address"></p>

    <script>
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // App ko poori screen par open karne ke liye

        const connectBtn = document.getElementById('connect-btn');
        const walletAddressTxt = document.getElementById('wallet-address');

        // Function to connect Phantom Wallet
        async function connectWallet() {
            const isPhantomAvailable = window.solana && window.solana.isPhantom;

            if (isPhantomAvailable) {
                try {
                    // Connect to Phantom
                    const resp = await window.solana.connect();
                    const walletAddress = resp.publicKey.toString();
                    
                    walletAddressTxt.innerText = "Connected: " + walletAddress.substring(0, 6) + "..." + walletAddress.substring(walletAddress.length - 4);
                    connectBtn.innerText = "Wallet Connected ✅";
                    
                    // Telegram par confirmation message show karna
                    tg.MainButton.setText("Wallet Connected! Ready to Play").show();
                } catch (err) {
                    console.error("Connection rejected", err);
                    alert("Wallet connection rejected!");
                }
            } else {
                alert("Phantom Wallet not found! Please open this inside a browser with Phantom extension or Phantom mobile app.");
            }
        }

        connectBtn.addEventListener('click', connectWallet);
    </script>
</body>
</html>
