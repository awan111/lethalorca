<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LethalOrca Fishing - Play & Earn $LORCA</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(to bottom, #204d66, #0e2533);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            background-color: #246083;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background-color: #357fae; }
        .wallet-panel {
            background: rgba(15, 34, 46, 0.95);
            border: 2px solid #357fae;
            border-radius: 15px;
            padding: 20px;
            width: 300px;
            text-align: center;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }
        .status {
            margin: 15px 0;
            font-weight: bold;
            color: #ffcc00;
        }
        .withdraw-btn {
            background-color: #25a244;
            width: 100%;
            padding: 12px;
            font-size: 16px;
        }
        .withdraw-btn:hover { background-color: #2dc653; }
        .hint {
            font-size: 12px;
            color: #a0a0a0;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Tokens: <span id="token-balance">30,000</span> $LORCA</h2>
        <button class="btn" id="connect-top-btn">Connect Wallet</button>
    </div>

    <!-- Wallet Sidebar / Panel -->
    <div class="wallet-panel">
        <h3>LIVE PHANTOM</h3>
        <p>Connect your Phantom wallet to withdraw LORCA tokens to your Solana account.</p>
        
        <button class="btn" id="phantom-connect-btn" style="background-color: #4e44ce; width: 100%; margin-bottom: 10px;">
            👻 Connect Phantom Wallet
        </button>

        <div class="status" id="tx-status">Wallet: Not Connected</div>

        <button class="btn withdraw-btn" id="withdraw-btn" disabled style="opacity: 0.5; cursor: not-allowed;">
            Withdraw Tokens
        </button>

        <p class="hint">💡 Don't have Phantom? Install it from phantom.app</p>
    </div>

    <script>
        let isConnected = false;
        const connectTopBtn = document.getElementById("connect-top-btn");
        const phantomConnectBtn = document.getElementById("phantom-connect-btn");
        const txStatus = document.getElementById("tx-status");
        const withdrawBtn = document.getElementById("withdraw-btn");

        // Function to handle connection visual state
        function handleConnect() {
            isConnected = true;
            connectTopBtn.innerText = "0xLorca...Connected";
            phantomConnectBtn.innerText = "👻 Connected";
            phantomConnectBtn.disabled = true;
            phantomConnectBtn.style.opacity = "0.7";
            
            txStatus.innerText = "Wallet Ready to Withdraw";
            txStatus.style.color = "#2dc653";
            
            // Enable withdrawal button
            withdrawBtn.disabled = false;
            withdrawBtn.style.opacity = "1";
            withdrawBtn.style.cursor = "pointer";
        }

        // Connect button listeners
        connectTopBtn.addEventListener("click", handleConnect);
        phantomConnectBtn.addEventListener("click", handleConnect);

        // Withdrawal Logic with 2 seconds processing simulator
        withdrawBtn.addEventListener("click", function() {
            txStatus.innerText = "Processing...";
            txStatus.style.color = "#ffcc00";
            withdrawBtn.disabled = true;
            withdrawBtn.style.opacity = "0.6";

            setTimeout(() => {
                alert("The simulator is working perfectly! Your 30,000 $LORCA tokens are securely logged. The withdrawal bridge goes live instantly once we hit the pump.fun bonding curve target and migrate to Raydium mainnet!");
                
                txStatus.innerText = "Locked until Mainnet Migration";
                txStatus.style.color = "#e63946";
            }, 2000);
        });
    </script>

</body>
</html>
