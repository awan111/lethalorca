<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Lethal Orca Arcade</title>
    <!-- Solana Web3 SDK -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/solana-web3.js/1.31.0/index.iife.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b1329;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 12px 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h2 { margin: 2px 0; font-size: 18px; color: #38bdf8; text-transform: uppercase; letter-spacing: 1px; }
        .btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 8px 18px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 5px;
            box-shadow: 0 2px 10px rgba(16, 185, 129, 0.4);
            transition: 0.2s;
        }
        .btn:hover { background-color: #059669; }
        #wallet-status { font-size: 12px; color: #38bdf8; margin-top: 4px; font-family: monospace; }
        #score-board { font-size: 22px; font-weight: bold; color: #fbbf24; margin-top: 4px; }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1e3a8a 0%, #070b19 100%);
            display: block;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <header>
            <h2>🐋 Lethal Orca Arcade</h2>
            <button id="connect-btn" class="btn">Connect Phantom Wallet</button>
            <div id="wallet-status">Wallet: Not Connected</div>
            <div id="score-board">Score: <span id="score">0</span> $LORCA</div>
        </header>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreTxt = document.getElementById('score');
        const connectBtn = document.getElementById('connect-btn');
        const walletStatus = document.getElementById('wallet-status');

        let score = 0;
        let fishes = [];
        let bubbles = [];
        let userWalletAddress = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Wallet Connection Logic
        async function connectWallet() {
            const isPhantomAvailable = window.solana && window.solana.isPhantom;
            if (isPhantomAvailable) {
                try {
                    const resp = await window.solana.connect();
                    userWalletAddress = resp.publicKey.toString();
                    walletStatus.innerText = "Connected: " + userWalletAddress.substring(0, 6) + "..." + userWalletAddress.substring(userWalletAddress.length - 4);
                    connectBtn.style.display = 'none';
                } catch (err) {
                    alert("Connection rejected!");
                }
            } else {
                const currentUrl = window.location.href;
                alert("Opening inside Phantom App Browser...");
                window.location.href = "https://phantom.app/ul/browse/" + encodeURIComponent(currentUrl);
            }
        }
        connectBtn.addEventListener('click', connectWallet);

        // Fish Horizontal Movement Logic (Left to Right)
        class Fish {
            constructor() {
                this.reset();
                this.x = Math.random() * canvas.width; // Initial random spread
            }
            reset() {
                this.x = -60 - Math.random() * 100; // Left screen se baahir spawn hogi
                this.y = Math.random() * (canvas.height - 200) + 150; // Top header se bacha kar middle zone me
                this.length = 45 + Math.random() * 15;
                this.height = this.length * 0.55;
                this.speed = 1.8 + Math.random() * 2.5; // Horizontal Speed
                
                // Neon Colors
                const colors = ['#38bdf8', '#f43f5e', '#10b981', '#fbbf24', '#a855f7'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.x += this.speed; // Right side ko move karegi
                if (this.x > canvas.width + 60) {
                    this.reset(); // Screen cross karne par wapas left par reset
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Tail (Left side par kyunki fish right side ja rahi hai)
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(-this.length/2, -this.height/3);
                ctx.lineTo(-this.length/2, this.height/3);
                ctx.closePath();
                ctx.fill();

                // Body
                ctx.beginPath();
                ctx.ellipse(0, 0, this.length/2, this.height/2, 0, 0, Math.PI * 2);
                ctx.fill();

                // Eye (Right side facing)
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.length/4, -this.height/6, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(this.length/4, -this.height/6, 1.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        class Bubble {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = 1 + Math.random() * 3;
                this.speed = 0.4 + Math.random() * 0.8;
            }
            update() {
                this.y -= this.speed;
                if (this.y < -10) {
                    this.y = canvas.height + 10;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.stroke();
            }
        }

        function initGame() {
            fishes = [];
            bubbles = [];
            for (let i = 0; i < 6; i++) fishes.push(new Fish());
            for (let i = 0; i < 15; i++) bubbles.push(new Bubble());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bubbles.forEach(b => { b.update(); b.draw(); });
            fishes.forEach(f => { f.update(); f.draw(); });
            requestAnimationFrame(animate);
        }

        function handleCatch(clickX, clickY) {
            fishes.forEach((fish) => {
                const dist = Math.hypot(clickX - fish.x, clickY - fish.y);
                if (dist < fish.length) {
                    score += 10;
                    scoreTxt.innerText = score;
                    fish.reset();
                }
            });
        }

        canvas.addEventListener('click', (e) => handleCatch(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            handleCatch(touch.clientX, touch.clientY);
            e.preventDefault();
        }, { passive: false });

        initGame();
        animate();
    </script>
</body>
</html>
