<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Lethal Orca Arcade</title>
    <!-- Solana Web3 SDK -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/solana-web3.js/1.31.0/index.iife.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b1329;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 12px 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h2 { margin: 2px 0; font-size: 16px; color: #38bdf8; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.2s;
            margin-top: 5px;
            box-shadow: 0 2px 10px rgba(16, 185, 129, 0.4);
        }
        .btn:hover { opacity: 0.9; }

        #stats-row {
            display: flex;
            gap: 20px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 6px;
        }
        #timer-board { color: #f43f5e; }
        #score-board { color: #fbbf24; }
        #wallet-status { font-size: 12px; color: #38bdf8; margin-top: 4px; font-family: monospace; }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1e3a8a 0%, #070b19 100%);
            display: block;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <header>
            <h2>🐋 Lethal Orca Arcade</h2>
            <button id="connect-btn" class="btn">Connect Wallet</button>
            <div id="wallet-status">Wallet: Not Connected</div>
            
            <div id="stats-row">
                <div id="timer-board">Time: <span id="time-left">30</span>s</div>
                <div id="score-board">Score: <span id="score">0</span> $LORCA</div>
            </div>
        </header>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreTxt = document.getElementById('score');
        const timerTxt = document.getElementById('time-left');
        const connectBtn = document.getElementById('connect-btn');
        const walletStatus = document.getElementById('wallet-status');

        let score = 0;
        let timeLeft = 30;
        let fishes = [];
        let bubbles = [];
        let userWalletAddress = null;
        let gameActive = true;
        let timerInterval = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 1. Phantom Wallet Connection
        async function connectWallet() {
            const isPhantomAvailable = window.solana && window.solana.isPhantom;
            if (isPhantomAvailable) {
                try {
                    const resp = await window.solana.connect();
                    userWalletAddress = resp.publicKey.toString();
                    walletStatus.innerText = "Connected: " + userWalletAddress.substring(0, 6) + "..." + userWalletAddress.substring(userWalletAddress.length - 4);
                    connectBtn.style.display = 'none';
                } catch (err) {
                    alert("Wallet connection rejected!");
                }
            } else {
                const currentUrl = window.location.href;
                window.location.href = "https://phantom.app/ul/browse/" + encodeURIComponent(currentUrl);
            }
        }
        connectBtn.addEventListener('click', connectWallet);

        // Auto Connect Check
        window.addEventListener('load', async () => {
            if (window.solana && window.solana.isPhantom) {
                try {
                    const resp = await window.solana.connect({ onlyIfTrusted: true });
                    userWalletAddress = resp.publicKey.toString();
                    walletStatus.innerText = "Connected: " + userWalletAddress.substring(0, 6) + "..." + userWalletAddress.substring(userWalletAddress.length - 4);
                    connectBtn.style.display = 'none';
                } catch (e) {}
            }
            startTimer();
        });

        // 2. Countdown Timer Logic
        function startTimer() {
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                timeLeft--;
                timerTxt.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    gameOverAndWithdraw();
                }
            }, 1000);
        }

        // 3. Game Over & Automatic Withdraw Trigger
        async function gameOverAndWithdraw() {
            gameActive = false; // Stop fish movement
            alert(`Game Over! Final Score: ${score} $LORCA`);

            if (!userWalletAddress) {
                alert("Wallet connected nahi tha, isliye automatic withdraw skip ho gaya. Pehle connect karein aur phir khelein!");
                return;
            }

            if (score < 100) {
                alert("Withdrawal ke liye kam se kam 100 score chahiye tha! Next time behtar koshish karein.");
                return;
            }

            // Trigger Automatic Blockchain Transaction Popup
            try {
                walletStatus.innerText = "Processing Auto-Withdrawal...";
                const connection = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('mainnet-beta'), 'confirmed');
                const transaction = new solanaWeb3.Transaction();

                const memoInstruction = new solanaWeb3.TransactionInstruction({
                    keys: [{ pubkey: new solanaWeb3.PublicKey(userWalletAddress), isSigner: true, isWritable: true }],
                    programId: new solanaWeb3.PublicKey("MemoSuj9HXvYrGvNu65Wj5QJgCcwYwYg77zJmZ64P"),
                    data: Uint8Array.from(Array.from(`Auto-Claim ${score} LORCA`).map(c => c.charCodeAt(0))),
                });

                transaction.add(memoInstruction);
                transaction.feePayer = new solanaWeb3.PublicKey(userWalletAddress);
                
                const blockhashObj = await connection.getLatestBlockhash();
                transaction.recentBlockhash = blockhashObj.blockhash;

                const { signature } = await window.solana.signAndSendTransaction(transaction);
                alert(`Withdraw Success! Tx Signature: ${signature.substring(0, 8)}...`);
                
                // Reset game parameters
                score = 0;
                scoreTxt.innerText = score;
            } catch (err) {
                console.error(err);
                alert("Auto-Withdrawal popup was closed or failed.");
            }
        }

        // --- Fish Engine ---
        class Fish {
            constructor() {
                this.reset();
                this.x = Math.random() * canvas.width;
            }
            reset() {
                this.x = -60 - Math.random() * 100;
                this.y = Math.random() * (canvas.height - 240) + 180;
                this.length = 45 + Math.random() * 15;
                this.height = this.length * 0.55;
                this.speed = 1.8 + Math.random() * 2.5;
                const colors = ['#38bdf8', '#f43f5e', '#10b981', '#fbbf24', '#a855f7'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                if (!gameActive) return; // Freeze movements on game over
                this.x += this.speed;
                if (this.x > canvas.width + 60) this.reset();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(-this.length/2, -this.height/3);
                ctx.lineTo(-this.length/2, this.height/3);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(0, 0, this.length/2, this.height/2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.length/4, -this.height/6, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(this.length/4, -this.height/6, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Bubble {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = 1 + Math.random() * 3;
                this.speed = 0.4 + Math.random() * 0.8;
            }
            update() {
                this.y -= this.speed;
                if (this.y < -10) {
                    this.y = canvas.height + 10;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.stroke();
            }
        }

        function initGame() {
            fishes = [];
            bubbles = [];
            for (let i = 0; i < 6; i++) fishes.push(new Fish());
            for (let i = 0; i < 15; i++) bubbles.push(new Bubble());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bubbles.forEach(b => { b.update(); b.draw(); });
            fishes.forEach(f => { f.update(); f.draw(); });
            requestAnimationFrame(animate);
        }

        function handleCatch(clickX, clickY) {
            if (!gameActive) return;
            fishes.forEach((fish) => {
                const dist = Math.hypot(clickX - fish.x, clickY - fish.y);
                if (dist < fish.length) {
                    score += 10;
                    scoreTxt.innerText = score;
                    fish.reset();
                }
            });
        }

        canvas.addEventListener('click', (e) => handleCatch(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            handleCatch(touch.clientX, touch.clientY);
            e.preventDefault();
        }, { passive: false });

        initGame();
        animate();
    </script>
</body>
</html>
