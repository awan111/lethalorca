<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lethal Orca Fishing Game</title>
    <!-- Telegram Web Apps Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Stable Solana Web3 Production Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/solana-web3.js/1.31.0/index.iife.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b1329;
            color: white;
            text-align: center;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            user-select: none;
        }
        header {
            margin-bottom: 10px;
        }
        .btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #059669;
        }
        #wallet-address {
            color: #38bdf8;
            font-family: monospace;
            font-size: 14px;
            margin: 5px 0;
        }
        #score-board {
            font-size: 20px;
            font-weight: bold;
            color: #fbbf24;
            margin: 5px 0;
        }
        canvas {
            background: linear-gradient(180deg, #1e3a8a 0%, #0f172a 100%);
            border: 3px solid #38bdf8;
            border-radius: 12px;
            display: block;
            margin: 0 auto;
            max-width: 100%;
            cursor: crosshair;
            box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <h2>🐋 Lethal Orca Fishing Arcade</h2>
        <button id="connect-btn" class="btn">Connect Phantom Wallet</button>
        <p id="wallet-address">Wallet: Not Connected</p>
        <div id="score-board">Score: <span id="score">0</span> $LORCA</div>
    </header>

    <!-- Game Canvas -->
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.expand();
        }

        const connectBtn = document.getElementById('connect-btn');
        const walletAddressTxt = document.getElementById('wallet-address');
        const scoreTxt = document.getElementById('score');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let score = 0;
        let walletConnected = false;
        let fishes = [];

        // Wallet Connection Logic
        async function connectWallet() {
            const isPhantomAvailable = window.solana && window.solana.isPhantom;
            if (isPhantomAvailable) {
                try {
                    const resp = await window.solana.connect();
                    const walletAddress = resp.publicKey.toString();
                    walletAddressTxt.innerText = "Wallet: " + walletAddress.substring(0, 6) + "..." + walletAddress.substring(walletAddress.length - 4);
                    connectBtn.style.display = 'none';
                    walletConnected = true;
                    if(tg && tg.MainButton) {
                        tg.MainButton.setText("Wallet Connected! Tap Fishes to Earn").show();
                    }
                } catch (err) {
                    console.error(err);
                    alert("Wallet connection rejected!");
                }
            } else {
                alert("Phantom Wallet nahi mila! Isay Phantom Mobile App ke andar Browser me open karein.");
            }
        }
        connectBtn.addEventListener('click', connectWallet);

        // Fish Class
        class Fish {
            constructor() {
                this.x = Math.random() * (canvas.width - 40) + 20;
                this.y = canvas.height + Math.random() * 100;
                this.radius = 20;
                this.speed = 1.5 + Math.random() * 2;
                this.emoji = "🐟";
            }
            update() {
                this.y -= this.speed;
                // Loop back to bottom if fish goes off-screen
                if (this.y < -40) {
                    this.y = canvas.height + Math.random() * 50;
                    this.x = Math.random() * (canvas.width - 40) + 20;
                }
            }
            draw() {
                ctx.save();
                ctx.font = "30px Arial";
                ctx.textBaseline = "middle";
                ctx.textAlign = "center";
                ctx.fillText(this.emoji, this.x, this.y);
                ctx.restore();
            }
        }

        // Initialize 5 Fishes
        function initFishes() {
            fishes = [];
            for (let i = 0; i < 5; i++) {
                fishes.push(new Fish());
            }
        }

        // Main Game Loop Animation
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background Water Details (Bubbles)
            ctx.font = "16px Arial";
            ctx.fillText("🫧", 60, 180);
            ctx.fillText("🫧", 320, 120);
            ctx.fillText("🫧", 200, 380);

            // Update & Render Fishes
            fishes.forEach(fish => {
                fish.update();
                fish.draw();
            });

            requestAnimationFrame(animate);
        }

        // Catch Fish (Tap/Click Event)
        function handleCatch(clickX, clickY) {
            fishes.forEach((fish) => {
                const dist = Math.hypot(clickX - fish.x, clickY - fish.y);
                // Hitbox check
                if (dist < 30) {
                    score += 10;
                    scoreTxt.innerText = score;
                    
                    // Respawn fish at the bottom instantly
                    fish.y = canvas.height + Math.random() * 30;
                    fish.x = Math.random() * (canvas.width - 40) + 20;
                    fish.speed = 1.5 + Math.random() * 2.5;
                }
            });
        }

        // Mouse Click
        canvas.addEventListener('click', (event) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const clickY = event.clientY - rect.top;
            handleCatch(clickX, clickY);
        });

        // Mobile/Telegram Touch Tap
        canvas.addEventListener('touchstart', (event) => {
            const rect = canvas.getBoundingClientRect();
            const touch = event.touches[0];
            const clickX = touch.clientX - rect.left;
            const clickY = touch.clientY - rect.top;
            handleCatch(clickX, clickY);
            event.preventDefault(); // Prevents double firing with click
        }, { passive: false });

        // Start everything
        initFishes();
        animate();
    </script>
</body>
</html>
