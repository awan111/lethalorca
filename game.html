<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Lethal Orca Fishing Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b1329;
            color: white;
            text-align: center;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            user-select: none;
        }
        header { margin-bottom: 10px; }
        #score-board {
            font-size: 24px;
            font-weight: bold;
            color: #fbbf24;
            margin: 5px 0;
        }
        canvas {
            background: linear-gradient(180deg, #1e3a8a 0%, #0f172a 100%);
            border: 3px solid #38bdf8;
            border-radius: 12px;
            display: block;
            margin: 0 auto;
            max-width: 100%;
            box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <h2>🐋 Lethal Orca Fishing Arcade</h2>
        <div id="score-board">Score: <span id="score">0</span> $LORCA</div>
    </header>

    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreTxt = document.getElementById('score');

        let score = 0;
        let fishes = [];

        class Fish {
            constructor() {
                this.x = Math.random() * (canvas.width - 60) + 30;
                this.y = canvas.height + Math.random() * 150;
                this.radius = 25;
                this.speed = 2 + Math.random() * 2.5;
                this.emoji = "🐟";
            }
            update() {
                this.y -= this.speed;
                if (this.y < -50) {
                    this.y = canvas.height + Math.random() * 100;
                    this.x = Math.random() * (canvas.width - 60) + 30;
                }
            }
            draw() {
                ctx.save();
                ctx.font = "38px Arial";
                ctx.textBaseline = "middle";
                ctx.textAlign = "center";
                ctx.fillText(this.emoji, this.x, this.y);
                ctx.restore();
            }
        }

        function initFishes() {
            fishes = [];
            for (let i = 0; i < 6; i++) {
                fishes.push(new Fish());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Bubbles background effect
            ctx.font = "20px Arial";
            ctx.fillText("🫧", 60, 140);
            ctx.fillText("🫧", 340, 220);
            ctx.fillText("🫧", 130, 390);

            fishes.forEach(fish => {
                fish.update();
                fish.draw();
            });
            requestAnimationFrame(animate);
        }

        function handleCatch(clickX, clickY) {
            fishes.forEach((fish) => {
                const dist = Math.hypot(clickX - fish.x, clickY - fish.y);
                if (dist < 40) {
                    score += 10;
                    scoreTxt.innerText = score;
                    fish.y = canvas.height + Math.random() * 50;
                    fish.x = Math.random() * (canvas.width - 60) + 30;
                }
            });
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            handleCatch(e.clientX - rect.left, e.clientY - rect.top);
        });

        canvas.addEventListener('touchstart', (e) => {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            handleCatch(touch.clientX - rect.left, touch.clientY - rect.top);
            e.preventDefault();
        }, { passive: false });

        initFishes();
        animate();
    </script>
</body>
</html>
