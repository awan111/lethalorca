<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LethalOrca Fishing - Token Catcher (Wallet Mockup)</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #001f3f, #000511);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
        }
        .score-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 15px #ffd700;
        }
        .fish {
            position: absolute;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .fish:active {
            transform: scale(0.8);
        }
        #game-over-screen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 5, 20, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 30px #ffd700;
            z-index: 20;
        }
        button {
            background: linear-gradient(45deg, #ffd700, #ffa500);
            color: black;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(255,215,0,0.4);
        }
        button:hover {
            background: linear-gradient(45deg, #ffa500, #ffd700);
        }
        .floating-text {
            position: absolute;
            font-weight: bold;
            font-size: 28px;
            animation: floatUp 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 15;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div class="score-box">Score: <span id="score-display">0 LORCA</span></div>
        <div class="score-box">Time: <span id="time-display">30</span>s</div>
    </div>

    <div id="game-over-screen">
        <h2>Time's Up!</h2>
        <p style="font-size: 20px;">You earned <span id="final-score" style="color:#ffd700; font-weight:bold;">0</span> LORCA tokens this round!</p>
        <button onclick="restartGame()">Play Again</button>
    </div>
</div>

<script>
    let score = 0;
    let timeLeft = 30;
    let gameInterval;
    let spawnInterval;
    const gameContainer = document.getElementById('game-container');

    // 🔊 Synthetic Pop Sound Generator (No file needed)
    function playPopSound(type) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            
            // Alag fish k liye alag sound pitch
            if (type === 'golden') {
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.15); // High pitch for reward
            } else if (type === 'jellyfish') {
                oscillator.frequency.setValueAtTime(250, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2); // Low buzz for danger
            } else {
                oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1); // Normal pop
            }

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.15);
        } catch (e) {
            console.log("Audio context blocked or not supported.");
        }
    }

    // Fish configuration
    const fishTypes = [
        { type: 'normal', points: 1, speed: 4, color: '#00ffff', label: '🐟' },
        { type: 'golden', points: 5, speed: 6, color: '#ffd700', label: '🐋' }, 
        { type: 'jellyfish', points: -5, speed: 3, color: '#ff4444', label: '👾' } 
    ];

    function startGame() {
        score = 0;
        timeLeft = 30;
        document.getElementById('score-display').innerText = "0 LORCA";
        document.getElementById('time-display').innerText = timeLeft;
        document.getElementById('game-over-screen').style.display = 'none';

        // Clear existing intervals if any
        clearInterval(gameInterval);
        clearInterval(spawnInterval);

        gameInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('time-display').innerText = timeLeft;
            if (timeLeft <= 0) {
                endGame();
            }
        }, 1000);

        spawnInterval = setInterval(spawnFish, 600);
    }

    function spawnFish() {
        if (timeLeft <= 0) return;

        const randomRoll = Math.random();
        let fishData = fishTypes[0]; 

        if (randomRoll > 0.80) {
            fishData = fishTypes[1]; // 20% Chance Golden Orca
        } else if (randomRoll < 0.15) {
            fishData = fishTypes[2]; // 15% Chance Jellyfish
        }

        const fish = document.createElement('div');
        fish.className = 'fish';
        fish.style.fontSize = fishData.type === 'golden' ? '52px' : '38px';
        fish.innerText = fishData.label;
        
        const side = Math.random() > 0.5 ? 'left' : 'right';
        const posY = Math.random() * (window.innerHeight - 120) + 60;
        fish.style.top = posY + 'px';

        if (side === 'left') {
            fish.style.left = '-70px';
            gameContainer.appendChild(fish);
            animateFish(fish, side, fishData);
        } else {
            fish.style.right = '-70px';
            gameContainer.appendChild(fish);
            animateFish(fish, side, fishData);
        }

        // Click handler
        fish.addEventListener('mousedown', (e) => {
            playPopSound(fishData.type); // Plays custom sound!
            score += fishData.points;
            if(score < 0) score = 0; 
            document.getElementById('score-display').innerText = score + " LORCA";
            
            showFloatingText(fishData.points, fish.offsetLeft, fish.offsetTop, fishData.color);
            fish.remove();
        });
    }

    function animateFish(fish, side, fishData) {
        let pos = -70;
        const speed = fishData.speed;
        
        const move = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(move);
                fish.remove();
                return;
            }
            
            pos += speed;
            if (side === 'left') {
                fish.style.left = pos + 'px';
            } else {
                fish.style.right = pos + 'px';
            }

            if (pos > window.innerWidth + 70) {
                clearInterval(move);
                fish.remove();
            }
        }, 20);
    }

    function showFloatingText(points, x, y, color) {
        const text = document.createElement('div');
        text.className = 'floating-text';
        text.style.left = x + 'px';
        text.style.top = y + 'px';
        text.style.color = color;
        text.innerText = points > 0 ? `+${points}` : `${points}`;
        gameContainer.appendChild(text);
        
        setTimeout(() => text.remove(), 800);
    }

    function endGame() {
        clearInterval(gameInterval);
        clearInterval(spawnInterval);
        document.getElementById('final-score').innerText = score;
        document.getElementById('game-over-screen').style.display = 'block';
    }

    function restartGame() {
        startGame();
    }

    // Auto start
    startGame();
</script>

</body>
</html>
