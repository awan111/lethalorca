<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LethalOrca Fishing - Token Catcher</title>
    <style>
        body { margin: 0; background: #001f3f; color: white; font-family: sans-serif; overflow: hidden; text-align: center; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        #ui-layer { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 24px; }
        .fish { position: absolute; font-size: 40px; cursor: pointer; }
        #game-over-screen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; }
        button { background: #00ffff; color: black; border: none; padding: 10px 20px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="ui-layer">
        <div>Score: <span id="score-display">0 LORCA</span></div>
        <div>Time: <span id="time-display">30</span>s</div>
    </div>
    <div id="game-over-screen">
        <h2>Time's Up!</h2>
        <p>You earned <span id="final-score">0</span> LORCA tokens this round!</p>
        <button onclick="startGame()">Play Again</button>
    </div>
</div>
<script>
    let score = 0; let timeLeft = 30; let gameInterval; let spawnInterval;
    function startGame() {
        score = 0; timeLeft = 30;
        document.getElementById('score-display').innerText = "0 LORCA";
        document.getElementById('game-over-screen').style.display = 'none';
        clearInterval(gameInterval); clearInterval(spawnInterval);
        gameInterval = setInterval(() => {
            timeLeft--; document.getElementById('time-display').innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);
        spawnInterval = setInterval(spawnFish, 800);
    }
    function spawnFish() {
        if (timeLeft <= 0) return;
        const fish = document.createElement('div');
        fish.className = 'fish'; fish.innerText = '🐟';
        fish.style.top = Math.random() * (window.innerHeight - 100) + 'px';
        fish.style.left = '-50px';
        document.getElementById('game-container').appendChild(fish);
        let pos = -50;
        const move = setInterval(() => {
            if (timeLeft <= 0) { clearInterval(move); fish.remove(); return; }
            pos += 4; fish.style.left = pos + 'px';
            if (pos > window.innerWidth) { clearInterval(move); fish.remove(); }
        }, 20);
        fish.addEventListener('mousedown', () => {
            score++; document.getElementById('score-display').innerText = score + " LORCA";
            fish.remove(); clearInterval(move);
        });
    }
    function endGame() { clearInterval(gameInterval); clearInterval(spawnInterval); document.getElementById('final-score').innerText = score; document.getElementById('game-over-screen').style.display = 'block'; }
    startGame();
</script>
</body>
</html>
