<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LethalOrca - Play & Earn $LORCA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(180deg, #0a4d68 0%, #05bfdb 100%);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(94, 234, 212, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 3.5rem;
            color: #ffd700;
            margin-bottom: 10px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.9;
            line-height: 1.6;
        }
        .btn-play {
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ff9500);
            color: #1a1a1a;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.3rem;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(255, 149, 0, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-play:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 149, 0, 0.6);
        }
        .token-info {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #5eead4;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐋 $LORCA</h1>
        <p>Welcome to LethalOrca! The ultimate Tap-to-Earn fishing game on Solana. Catch fish, stack points, and claim your rewards.</p>
        
        <!-- Yeh button user ko game par le jaye ga -->
        <a href="game.html" class="btn-play">🎮 Play Game</a>

        <div class="token-info">POWERED BY PUMP.FUN</div>
    </div>

</body>
</html>
